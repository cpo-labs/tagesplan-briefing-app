# pnpm asks about build-script approval the first time it sees these
# packages. The app does not actually need their post-install scripts to
# run (the next build still works), so we keep them disabled. If you
# later want sharp's native binaries (image optimization), flip to true.
onlyBuiltDependencies:
  - "@swc/core"
ignoredBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver
